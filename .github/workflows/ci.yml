# Continuous-integration: typecheck + tests on every push/PR.
# No deploy, no DB. Fast feedback only.
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install deps
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run pytest (pure-function suite — no DB)
        working-directory: backend
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Vitest
        working-directory: frontend
        run: npm test
      - name: Build (catches Vite/PWA regressions tests miss)
        working-directory: frontend
        run: npm run build
