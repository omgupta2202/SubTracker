[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# VITE_API_BASE is set in Netlify UI (Site settings → Environment variables).
# It is intentionally NOT committed in .env.production — production URLs are
# deployment config, not source. The redirect rule below provides a fallback
# for any code path that still uses the relative "/api" prefix.
[build.environment]
  # Match `engines.node` in frontend/package.json + .nvmrc. Bumped from
  # 20 → 24 (current LTS) alongside the Python 3.13 deployment runtime.
  NODE_VERSION = "24"

# When VITE_API_BASE is left as "/api" but the backend lives on a separate
# host, set BACKEND_URL in Netlify env and Netlify will proxy /api/* to it.
# Without this rule, /api/* would 404 on a static-only deploy.
[[redirects]]
  from   = "/api/*"
  to     = "https://subtracker-api-n282.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — must come AFTER /api/* so it doesn't swallow API calls.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
