<?xml version="1.0" encoding="UTF-8"?>
<!--
  SubTracker brand mark.
  A rounded violet→fuchsia tile with three rising bars (the dashboard
  pulse) and a small accent dot — reads as "personal finance chart"
  even at 16px favicon size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="SubTracker">
  <defs>
    <linearGradient id="st-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="60%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="st-bar" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#st-bg)"/>
  <!-- subtle inner highlight (top-left wash) -->
  <path d="M14 14 Q14 14 50 14 L50 22 Q40 18 14 22 Z" fill="#ffffff" opacity="0.10"/>
  <!-- three bars of increasing height — the "tracker" rhythm -->
  <rect x="14" y="38" width="9"  height="14" rx="3" fill="url(#st-bar)"/>
  <rect x="27.5" y="28" width="9" height="24" rx="3" fill="url(#st-bar)"/>
  <rect x="41" y="18" width="9"  height="34" rx="3" fill="url(#st-bar)"/>
  <!-- accent dot above the tallest bar (gain marker) -->
  <circle cx="45.5" cy="13" r="3" fill="#ffffff"/>
</svg>
